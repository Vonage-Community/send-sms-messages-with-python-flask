<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

    <title>Send an SMS</title>
</head>

<body>

    <div class="container">
        
        <h1>Send an SMS</h1>
        
        <form action="/send_sms" method="POST">
            <div class="form-group"><label for="destination">Phone Number</label>
                <input id="to_number" class="form-control" name="to_number" type="tel" placeholder="Phone Number" />
            </div>
            
            <div class="form-group"><label for="message">Message</label>
                <textarea id="message" class="form-control" name="message"
                    placeholder="Your message goes here"></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary">Send SMS</button>
        </form>
    </div>
</body>

</html>
